---
name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: { }

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    # Dependabot PRs run in an isolated context that does not receive org/repo
    # secrets via the pull_request event. Skip the scan for Dependabot since it
    # only bumps dependency versions and will not introduce committed secrets.
    # To also scan Dependabot PRs, add GITLEAKS_LICENSE as a Dependabot secret:
    # Settings → Secrets and variables → Dependabot → New secret.
    # Use PR author instead of github.actor: actor changes on manual re-runs,
    # which would cause the job to run again on a Dependabot PR and fail.
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.user.login != 'dependabot[bot]'
      }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          log-level: warn
          redact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  npm-audit:
    name: Scan npm dependencies for vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical

  bundler-audit:
    name: Scan Ruby gems for vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install bundler-audit
        run: gem install bundler-audit

      - name: Run Bundler Audit
        run: bundle exec bundler-audit check --update

