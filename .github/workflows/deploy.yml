---
name: Deploy Website

on:
  push:
    branches: [main]
  schedule:
    # Monday 3 PM UTC (11 AM EDT) — refresh before the week's hacknight.
    - cron: "0 15 * * 1"
    # Thursday 2 AM UTC (Wed 10 PM EDT) — refresh after Wednesday hacknight ends
    # so the site shows the next upcoming event rather than the just-finished one.
    - cron: "0 2 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Shared with preview-deploy so pushes to gh-pages are serialized.
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Generate minified assets
        run: npm run minify

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          # keep_files preserves pr-N/ preview subdirectories across production deploys.
          keep_files: true
