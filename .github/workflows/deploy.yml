---
name: Deploy Website

on:
  push:
    branches: [main]
  schedule:
    # Monday 3 PM UTC (11 AM EDT) — refresh before the week's hacknight.
    - cron: "0 15 * * 1"
    # Thursday 2 AM UTC (Wed 10 PM EDT) — refresh after Wednesday hacknight ends
    # so the site shows the next upcoming event rather than the just-finished one.
    - cron: "0 2 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Shared with preview-deploy so pushes to gh-pages are serialized.
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      # contents: write is required by peaceiris/actions-gh-pages to push the
      # built site to gh-pages with keep_files: true (which preserves pr-N/
      # preview subdirectories). Migrating to the native actions/deploy-pages
      # API would allow pages: write + id-token: write instead, but that API
      # does not support keep_files and would wipe preview directories on every
      # production deploy. Tracked as FIND-05 in the threat model.
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=critical

      - name: Generate minified assets
        run: npm run minify

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          # keep_files preserves pr-N/ preview subdirectories across production deploys.
          keep_files: true
