---
name: Preview Deploy

on:
  push:
    branches:
      - "perf/**"
      - "feature/**"
      - "dev"
  pull_request:

permissions: { }

concurrency:
  # Shared with deploy.yml so all pushes to gh-pages are serialized.
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # Use stable, PR-numbered preview paths to avoid branch-name drift.
      PREVIEW_DIR: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Generate minified assets
        run: npm run minify

      - name: Build Jekyll site
        # Previews are served at civictechwr.org/pr-N/ so baseurl must match.
        run: bundle exec jekyll build --baseurl "/${{ env.PREVIEW_DIR }}"
        env:
          JEKYLL_ENV: production

      - name: Remove CNAME from preview build
        # CNAME belongs at the gh-pages root only. A CNAME inside pr-N/ is
        # harmless but confusing — remove it so the subdirectory is clean.
        run: rm -f _site/CNAME

      - name: Deploy to GitHub Pages (preview)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          destination_dir: ${{ env.PREVIEW_DIR }}
          # keep_files preserves production files and other PR previews.
          keep_files: true

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          PREVIEW_DIR: ${{ env.PREVIEW_DIR }}
        with:
          script: |
            const previewDir = process.env.PREVIEW_DIR;
            // Previews are served under the production custom domain.
            const previewUrl = `https://civictechwr.org/${previewDir}/`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed to: ${previewUrl}`
            });
