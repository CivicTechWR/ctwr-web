---
name: Preview Deploy

on:
  push:
    branches:
      - "perf/**"
      - "feature/**"
      - "dev"
    paths-ignore:
      - ".github/**"
      - "tests/**"
      - "docs/**"
  pull_request:
    paths-ignore:
      - ".github/**"
      - "tests/**"
      - "docs/**"


permissions: { }

concurrency:
  # Shared with deploy.yml so all pushes to gh-pages are serialized.
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Use stable, PR-numbered preview paths to avoid branch-name drift.
      PREVIEW_DIR: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Generate minified assets
        run: npm run minify

      - name: Build Jekyll site
        # Previews are served at civictechwr.org/pr-N/ so baseurl must match.
        run: bundle exec jekyll build --baseurl "/${{ env.PREVIEW_DIR }}"
        env:
          JEKYLL_ENV: production

      - name: Remove CNAME from preview build
        # CNAME belongs at the gh-pages root only. A CNAME inside pr-N/ is
        # harmless but confusing — remove it so the subdirectory is clean.
        run: rm -f _site/CNAME

      - name: Deploy to GitHub Pages (preview)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          destination_dir: ${{ env.PREVIEW_DIR }}
          # keep_files preserves production files and other PR previews.
          keep_files: true

  comment-pr:
    # Separated from deploy-preview so pull-requests: write is never held
    # alongside contents: write in the same job token.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    needs: deploy-preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with preview URL
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PREVIEW_DIR: ${{ format('pr-{0}', github.event.pull_request.number) }}
        with:
          script: |
            const previewDir = process.env.PREVIEW_DIR;
            // Previews are served under the production custom domain.
            const previewUrl = `https://civictechwr.org/${previewDir}/`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed to: ${previewUrl}`
            });
