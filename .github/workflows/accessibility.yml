---
name: Accessibility

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "tests/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - "CNAME"
      - "robots.txt"
  pull_request:
    paths-ignore:
      - ".github/**"
      - "tests/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - "CNAME"
      - "robots.txt"
  schedule:
    - cron: "0 12 * * 1"

permissions: { }

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pa11y:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build site
        run: |
          bundle exec jekyll build
          echo "Build completed successfully"
          ls -la _site/

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Configure Chrome for accessibility testing
        run: |
          echo "PUPPETEER_EXECUTABLE_PATH=$(which google-chrome-stable)" >> "$GITHUB_ENV"
          mkdir -p node_modules/chromedriver/lib/chromedriver
          ln -sf "$(which chromedriver)" node_modules/chromedriver/lib/chromedriver/chromedriver

      - name: Run accessibility checks against built site
        run: |
          echo "Starting http-server on port 4000..."
          npx --yes http-server _site -p 4000 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 5
          echo "Testing server connectivity..."
          curl -I http://127.0.0.1:4000/ || echo "Server not responding"
          echo "Running pa11y-ci (HTML_CodeSniffer / WCAG2AA)..."
          npx --yes pa11y-ci --config .pa11yci.json
          echo "Running axe-core checks..."
          PAGES=("http://127.0.0.1:4000/" "http://127.0.0.1:4000/about.html" "http://127.0.0.1:4000/projects.html")
          for url in "${PAGES[@]}"; do
            npx @axe-core/cli "$url" --chrome-options="no-sandbox,disable-setuid-sandbox,disable-dev-shm-usage"
          done
