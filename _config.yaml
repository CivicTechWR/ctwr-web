---
# Basic site settings
title: Civic Tech Waterloo Region
tagline: "Weekly civic tech hacknights in Kitchener-Waterloo — everyone welcome"
email: civictechwr@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Civic Tech Waterloo Region is a community group that brings together people
  from different sectors and industries to actively solve issues facing our
  local community using technology-based solutions.
baseurl: "" # The subpath of your site, e.g., /blog
url: "https://civictechwr.org" # The base URL of your site

# Socials
slack_invite: https://join.slack.com/t/civictechwr/shared_invite/zt-2hk4c93hv-DEIbxR_z1xKj8cZmayVHTw
instagram: https://instagram.com/civictechwr
meetup: https://luma.com/civictechwr
threads: https://www.threads.com/@civictechwr
facebook: https://facebook.com/civictechwr

# Exclusions
exclude:
  - ".sass-cache"
  - ".jekyll-cache"
  - "node_modules"
  - "Gemfile"
  - "Gemfile.lock"
  - "vendor"
  - "README.md"
  - "LICENSE.txt"
  - "docs"
  - "scripts"
  - "eslint.config.js"
  - ".stylelintrc.json"
  - ".htmlhintrc"
  - "package.json"
  - "package-lock.json"
  - ".gitignore"
  - ".cursorrules"
  - ".cursorignore"
  - "*.min.js.map"

# Includes
include:
  - ".htaccess"
  - "css/*.min.css"
  - "js/*.min.js"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: America/Toronto

# Keep files
keep_files:
  - css/*.min.css
  - js/*.min.js

# Performance optimizations
incremental: true
future: false
unpublished: false

# Collections
collections:
  projects:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      author: "CivicTechWR"
      comments: false
      share: false
      read_time: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO - root-level keys read by jekyll-seo-tag
logo: "/images/logos/civictechwr_logo_black.png"

social:
  name: "Civic Tech Waterloo Region"
  links:
    - "https://www.threads.com/@civictechwr"
    - "https://bsky.app/profile/civictechwr.bsky.social"
    - "https://facebook.com/civictechwr"
    - "https://instagram.com/civictechwr"
    - "https://www.linkedin.com/company/civictechwr"

# JSON-LD Organization type for jekyll-seo-tag
author:
  type: "Organization"
  name: "Civic Tech Waterloo Region"

# Google Search Console verification
# 1. Go to https://search.google.com/search-console
# 2. Add property for https://civictechwr.org
# 3. Choose "HTML tag" verification method
# 4. Paste the content= value below and uncomment
# google_site_verification: "paste_your_code_here"
