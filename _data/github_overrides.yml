# GitHub repository metadata overrides
# Key = the exact repo.name from the GitHub API
#   e.g., "ctwr-web" for github.com/CivicTechWR/ctwr-web
#
# Available fields:
#   display_name: Human-readable name (replaces the repo name in the UI)
#   description:  Override the GitHub description
#   tags:         Array of filter tags (e.g., ["open-data", "elections"])
#   url:          Live site URL (defaults to the GitHub repo page)
#   hidden:       Set to true to exclude this repo from the page entirely
#
# Example:
#   my-repo-name:
#     display_name: "My Friendly Name"
#     description: "A brief description of what this project does."
#     tags: ["civic-engagement", "open-data"]
#     url: "https://my-project.org"

ctwr-web:
  display_name: "CivicTechWR Website"
  description: "The official CivicTechWR website — open source and volunteer-maintained."
  tags: ["web", "community"]
  url: "https://civictechwr.org"
  hidden: true

